            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', 'Poppins', sans-serif;
            background: radial-gradient(circle at 10% 30%, #0a0f1e, #0c1a1f);
            min-height: 100vh;
            padding: 1rem;
            padding-bottom: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(90deg, rgba(0, 255, 255, 0.03) 0px, rgba(0, 255, 255, 0.03) 2px, transparent 2px, transparent 8px),
                repeating-linear-gradient(0deg, rgba(255, 0, 255, 0.02) 0px, rgba(255, 0, 255, 0.02) 1px, transparent 1px, transparent 12px);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: "";
            position: fixed;
            width: 150%;
            height: 150%;
            top: -25%;
            left: -25%;
            background: radial-gradient(ellipse at 40% 50%, rgba(0, 180, 200, 0.08), transparent 70%);
            animation: rotateSlow 30s infinite linear;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes rotateSlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .shop-wrapper {
            max-width: 1300px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .store-header {
            background: rgba(15, 25, 35, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 0.8rem 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .logo-icon {
            font-size: 2rem;
            filter: drop-shadow(0 0 5px #0ff);
        }
        .logo-text h1 {
            font-size: 1.6rem;
            background: linear-gradient(135deg, #c0ffd0, #2affb6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            text-shadow: 0 0 5px rgba(0,255,200,0.3);
        }
        .logo-text p {
            font-size: 0.7rem;
            color: #9cefd8;
        }

        .cart-header-icon {
            background: rgba(0, 30, 30, 0.8);
            backdrop-filter: blur(4px);
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            color: #bfffe0;
            border: 1px solid #0ff;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            gap: 0.5rem;
            transition: 0.2s;
        }
        .cart-header-icon:hover {
            background: #0ff22a33;
            border-color: #2affb6;
            box-shadow: 0 0 8px #0ff;
        }

        .categories-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 2rem;
            justify-content: center;
        }
        .cat-btn {
            background: rgba(10, 20, 25, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 255, 200, 0.4);
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            color: #d0f0e8;
            letter-spacing: 0.5px;
        }
        .cat-btn:hover {
            background: #0ff22a22;
            border-color: #0ff;
            box-shadow: 0 0 6px #0ff;
            color: white;
        }
        .cat-btn.active {
            background: #0f5e4a;
            border-color: #2affb6;
            color: white;
            box-shadow: 0 0 10px #0ff;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.5rem;
        }
        .product-card {
            background: rgba(20, 30, 35, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 1.5rem;
            padding: 1rem;
            border: 1px solid rgba(0, 255, 200, 0.2);
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .product-card:hover {
            transform: translateY(-6px);
            border-color: #0ff;
            box-shadow: 0 12px 28px rgba(0, 255, 200, 0.2);
            background: rgba(30, 45, 50, 0.8);
        }
        .product-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 1rem;
            margin-bottom: 0.6rem;
            background: #1e2a2a;
            border: 1px solid rgba(0,255,200,0.2);
        }
        .product-name {
            font-weight: 700;
            margin-bottom: 0.4rem;
            font-size: 1rem;
            color: #f0fff0;
        }
        .product-price {
            font-size: 1.2rem;
            font-weight: 800;
            color: #f5b042;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 3px rgba(0,0,0,0.5);
        }
        .product-sold {
            font-size: 0.7rem;
            color: #b0e0d0;
            margin-bottom: 0.5rem;
        }
        .quantity-selector {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 2rem;
            padding: 0.2rem 0.4rem;
            margin: 0.5rem 0;
        }
        .qty-btn {
            background: #2c4a44;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: 0.1s;
        }
        .qty-btn:hover {
            background: #0ff;
            color: #000;
        }
        .qty-num {
            font-weight: bold;
            min-width: 36px;
            text-align: center;
            color: #e0ffe0;
        }
        .add-to-cart {
            background: linear-gradient(95deg, #1b5e4a, #0c3a2f);
            color: white;
            border: none;
            padding: 0.5rem;
            width: 100%;
            border-radius: 2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 0.3rem;
            transition: 0.2s;
            border: 1px solid rgba(0,255,200,0.4);
        }
        .add-to-cart:hover {
            background: linear-gradient(95deg, #2c8a6a, #1f5e4a);
            box-shadow: 0 0 8px #0ff;
        }

        .cart-modal {

            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;

            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 1px solid #0ff44a;
            padding-bottom: 0.5rem;

        }
        .close-cart {

            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #0ff;
        }
        .cart-items-list {

            overflow-y: auto;
            margin: 1rem 0;
            color: #eef;
        }
        .cart-item {

            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid #2f6b5a;
        }
        .cart-total {

            padding-top: 0.8rem;
            text-align: right;
            font-weight: bold;
            font-size: 1.2rem;
            margin: 0.5rem 0;
            color: #ffd966;
        }
        .address-form {
            margin: 1rem 0;
            background: rgba(0, 0, 0, 0.3);
            padding: 0.8rem;
            border-radius: 1.2rem;
        }
        .address-form input, .address-form textarea {
            width: 100%;
            margin-bottom: 0.5rem;
            padding: 0.5rem;
            border-radius: 1rem;
            border: 1px solid #2f9f8a;
            background: #1e2a2a;
            color: #eef;
            font-size: 0.85rem;
        }
        .payment-options {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 1rem 0;
        }
        .pay-btn {
            flex: 1;
            background: #1e3a34;
            border: 1px solid #0ff;
            border-radius: 2rem;
            padding: 0.6rem;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            color: #d0ffe0;
        }
        .pay-btn.selected {
            background: #0f5e4a;
            border-color: #2affb6;
            color: white;
            box-shadow: 0 0 6px #0ff;
        }
        .qr-preview {
            margin: 1rem auto;
            text-align: center;
        }
        .qr-img {
            width: 180px;
            height: 180px;
            object-fit: contain;
            border-radius: 12px;
            border: 1px solid #0ff;
            background: white;
            padding: 4px;
        }
        .confirm-order-btn {
            width: 100%;
            background: linear-gradient(95deg, #1b5e4a, #0c3a2f);
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
            border: 1px solid #0ff;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #0c3a2f;
            border: 1px solid #0ff;
            color: #e0ffe0;
            padding: 8px 20px;
            border-radius: 40px;
            z-index: 1100;
            font-size: 0.85rem;
            box-shadow: 0 0 12px #0ff;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1e2a2a;
        }
        ::-webkit-scrollbar-thumb {
            background: #0ff;
            border-radius: 10px;
        }
        .amount-highlight {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffaa33;
            text-align: center;
            margin: 0.5rem 0;
            text-shadow: 0 0 5px #ffaa33;
        }
        .manual-pay-tip {
            background: #ffaa3322;
            border-left: 4px solid #ffaa33;
            padding: 0.5rem;
            border-radius: 0.8rem;
            font-size: 0.8rem;
            margin: 0.5rem 0;
            color: #ffdd99;
        }
        .field-error {
            border-color: #ff5555 !important;
            box-shadow: 0 0 4px #ff5555;
        }
    </style>
</head>

        if (name.includes('+')) return "套装";

        if (lower.includes('声卡') || lower.includes('midi') || lower.includes('ixi') || lower.includes('rme') || lower.includes('icon') || lower.includes('terratec') || lower.includes('platane up') || lower.includes('坦克') || lower.includes('话放') || lower.includes('m2') || lower.includes('babyface') || lower.includes('明星s')) return "声卡";
        if (lower.includes('麦克风') || lower.includes('mk4') || lower.includes('neumann') || lower.includes('诺音曼') || lower.includes('铁三角') || lower.includes('akg') || lower.includes('union m') || lower.includes('exd m') || lower.includes('烟头') || lower.includes('阿斯顿') || lower.includes('maono p') || lower.includes('u87') || lower.includes('103') || lower.includes('105') || lower.includes('xc414') || lower.includes('m80') || lower.includes('m149')) return "麦克风";
        if (lower.includes('耳机') || lower.includes('exd-x2') || lower.includes('监听耳机') || lower.includes('丁一号') || lower.includes('e-xd') || lower.includes('wh700') || lower.includes('hd500') || lower.includes('tx10pro')) return "耳机";
        return "配件";
    }

    const finalProducts = productsData.map(p => ({ ...p, category: getCategory(p.name) }));

    let cart = [];
    let selectedPay = "wechat";
    let currentCategory = "all";

    function showToast(msg) {
        let toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderProducts() {
        const grid = document.getElementById('productGrid');
        if (!grid) return;
        const filtered = currentCategory === 'all' ? finalProducts : finalProducts.filter(p => p.category === currentCategory);
        grid.innerHTML = '';
        filtered.forEach(p => {
            const qtyId = `qty-${p.id}`;
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                ${p.img ? `<img class="product-img" src="${p.img}" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20200%20200%22%3E%3Crect%20width%3D%22200%22%20height%3D%22200%22%20fill%3D%22%23333%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20text-anchor%3D%22middle%22%20dy%3D%22.3em%22%20fill%3D%22%23ccc%22%3E%E6%9A%82%E6%97%A0%E5%9B%BE%E7%89%87%3C%2Ftext%3E%3C%2Fsvg%3E'">` : `<div class="product-img" style="display:flex;align-items:center;justify-content:center;">🎧</div>`}
                <div class="product-name">${escapeHtml(p.name)}</div>
                <div class="product-price">${p.isRealPrice ? "实价" : `¥${p.price.toFixed(2)}`}</div>
                <div class="product-sold">🔥 已售 ${p.sold} 件</div>
                <div class="quantity-selector">
                    <button class="qty-btn decr" data-id="${p.id}">−</button>
                    <span class="qty-num" id="${qtyId}">0</span>
                    <button class="qty-btn incr" data-id="${p.id}">+</button>
                </div>
                <button class="add-to-cart" data-id="${p.id}" data-name="${escapeHtml(p.name)}" data-price="${p.price}" data-real="${p.isRealPrice || false}">➕ 加入购物车</button>
            `;
            grid.appendChild(card);
        });

        filtered.forEach(p => {
            const decrBtn = document.querySelector(`.decr[data-id="${p.id}"]`);
            const incrBtn = document.querySelector(`.incr[data-id="${p.id}"]`);
            const qtySpan = document.getElementById(`qty-${p.id}`);
            let currentQty = 0;
            if (decrBtn) {
                decrBtn.onclick = (e) => {
                    e.stopPropagation();
                    if (currentQty > 0) currentQty--;
                    qtySpan.innerText = currentQty;
                };
            }
            if (incrBtn) {
                incrBtn.onclick = (e) => {
                    e.stopPropagation();
                    currentQty++;
                    qtySpan.innerText = currentQty;
                };
            }
            const addBtn = document.querySelector(`.add-to-cart[data-id="${p.id}"]`);
            if (addBtn) {
                addBtn.addEventListener('click', () => {
                    const qty = parseInt(qtySpan.innerText);
                    if (qty === 0) { showToast("请先选择数量（点击 + 号）"); return; }
                    if (p.isRealPrice) {
                        // 优化实价商品提示，显示客服微信
                        alert(`【实价商品】${p.name} 价格需咨询客服。\n请添加客服微信：${CUSTOMER_SERVICE_WECHAT} 询价购买。`);
                        return;
                    }
                    addToCart(p.id, p.name, p.price, qty);
                    currentQty = 0;
                    qtySpan.innerText = "0";
                });
            }
        });
    }

    function addToCart(id, name, price, quantity) {
        const existing = cart.find(item => item.id === id);
        if (existing) existing.quantity += quantity;
        else cart.push({ id, name, price, quantity });
        updateCartUI();
        showToast(`✅ 已添加 ${quantity} 件 ${name}`);
    }

    function updateCartUI() {
        const container = document.getElementById('cartItemsContainer');
        const totalSpan = document.getElementById('cartTotalArea');
        const headerCount = document.getElementById('headerCartCount');
        let total = 0, totalQty = 0;
        if (cart.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:1rem;">🛒 购物车空空如也</div>';
            if (totalSpan) totalSpan.innerHTML = '总计: ¥0.00';
            if (headerCount) headerCount.innerText = '0';
            return;
        }
        let html = '';
        cart.forEach((item, idx) => {
            const itemTotal = item.price * item.quantity;
            total += itemTotal;
            totalQty += item.quantity;
            html += `
                <div class="cart-item">
                    <div style="flex:2;">
                        <div>${escapeHtml(item.name)}</div>
                        <div>¥${item.price.toFixed(2)} x ${item.quantity}</div>
                    </div>
                    <div style="display:flex; gap:6px;">
                        <button class="cart-qty-btn" data-idx="${idx}" data-delta="-1">-</button>
                        <span>${item.quantity}</span>
                        <button class="cart-qty-btn" data-idx="${idx}" data-delta="1">+</button>
                        <button class="cart-remove" data-idx="${idx}">🗑️</button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
        totalSpan.innerHTML = `总计: ¥${total.toFixed(2)}`;
        headerCount.innerText = totalQty;

        document.querySelectorAll('.cart-qty-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.dataset.idx);
                const delta = parseInt(btn.dataset.delta);
                if (cart[idx]) {
                    cart[idx].quantity += delta;
                    if (cart[idx].quantity <= 0) cart.splice(idx, 1);
                    updateCartUI();
                }
            });
        });
        document.querySelectorAll('.cart-remove').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.dataset.idx);
                cart.splice(idx, 1);
                updateCartUI();
            });
        });
    }

    function showCartModal() {
        updateCartUI();
        document.getElementById('cartModal').style.display = 'flex';
        selectedPay = "wechat";
        document.querySelectorAll('.pay-btn').forEach(btn => {
            if (btn.dataset.pay === selectedPay) btn.classList.add('selected');
            else btn.classList.remove('selected');
        });
        updateQrPreview();
        // 清除表单错误样式
        document.querySelectorAll('.address-form input, .address-form textarea').forEach(el => el.classList.remove('field-error'));
    }

    function hideCartModal() {
        document.getElementById('cartModal').style.display = 'none';
    }

    function updateQrPreview() {
        const qrDiv = document.getElementById('qrPreview');
        const url = selectedPay === 'wechat' ? WECHAT_QR_URL : ALIPAY_QR_URL;
        qrDiv.innerHTML = `<img class="qr-img" src="${url}" alt="${selectedPay === 'wechat' ? '微信收款码' : '支付宝收款码'}" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20200%20200%22%3E%3Crect%20width%3D%22200%22%20height%3D%22200%22%20fill%3D%22%23333%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20text-anchor%3D%22middle%22%20dy%3D%22.3em%22%20fill%3D%22%23ccc%22%3E%E6%94%B6%E6%AC%BE%E7%A0%81%3C%2Ftext%3E%3C%2Fsvg%3E'">`;
    }

    function validateAddressForm() {
        let valid = true;
        const name = document.getElementById('receiverName');
        const phone = document.getElementById('receiverPhone');
        const addr = document.getElementById('receiverAddress');
        if (!name.value.trim()) { name.classList.add('field-error'); valid = false; } else name.classList.remove('field-error');
        if (!phone.value.trim()) { phone.classList.add('field-error'); valid = false; } else phone.classList.remove('field-error');
        if (!addr.value.trim()) { addr.classList.add('field-error'); valid = false; } else addr.classList.remove('field-error');
        return valid;
    }

    async function confirmOrder() {
        if (cart.length === 0) { alert("购物车不能为空"); return; }
        if (!validateAddressForm()) { alert("请完整填写收货信息"); return; }
        const name = document.getElementById('receiverName').value.trim();
        const phone = document.getElementById('receiverPhone').value.trim();
        const address = document.getElementById('receiverAddress').value.trim();
        const total = cart.reduce((s,i) => s + i.price * i.quantity, 0);
        const orderId = 'LAN' + Date.now().toString().slice(-8);
        const itemsList = cart.map(i => `${i.name} x${i.quantity}`).join('；');
        const payMethod = selectedPay === 'wechat' ? '微信支付' : '支付宝支付';
        const orderInfo = `订单号: ${orderId}\n总金额: ¥${total.toFixed(2)}\n支付方式: ${payMethod}\n商品: ${itemsList}\n收货人: ${name}\n电话: ${phone}\n地址: ${address}`;
        
        // 显示带金额高亮的确认面板（替换原模态框内容）
        const modalContent = document.querySelector('#cartModal .cart-modal-content');
        const originalHTML = modalContent.innerHTML;
        modalContent.innerHTML = `
            <div class="cart-modal-header">
                <span>🎛️ 订单确认</span>
                <button class="close-cart" id="tempCloseBtn">&times;</button>
            </div>
            <div class="amount-highlight">💰 应付金额：¥${total.toFixed(2)}</div>
            <div class="manual-pay-tip">⚠️ 请打开 ${payMethod}，扫描下方收款码，并<strong>手动输入以上金额 ¥${total.toFixed(2)}</strong> 完成支付。<br>（收款码为固定码，金额需手动填写）</div>
            <div id="qrPreviewTemp"></div>
            <button id="tempConfirmBtn" class="confirm-order-btn">✅ 我已支付完成</button>
        `;
        // 复制收款码预览
        const oldPreview = document.getElementById('qrPreview').cloneNode(true);
        document.getElementById('qrPreviewTemp').appendChild(oldPreview);
        
        const tempClose = document.getElementById('tempCloseBtn');
        tempClose.onclick = () => {
            modalContent.innerHTML = originalHTML;
            bindCartModalEvents();
            hideCartModal();
        };
        const tempConfirm = document.getElementById('tempConfirmBtn');
        tempConfirm.onclick = async () => {
            if (PUSHPLUS_TOKEN && PUSHPLUS_TOKEN !== "你的PushPlus Token") {
                try {
                    await fetch('https://www.pushplus.plus/send', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token: PUSHPLUS_TOKEN, title: '蓝桉商城新订单', content: orderInfo, template: 'json' })
                    });
                } catch(e) { console.error(e); }
            }
            alert(`订单已提交！\n订单号：${orderId}\n总金额：¥${total.toFixed(2)}\n请等待商家确认收货。`);
            if (confirm("是否清空购物车？")) {
                cart = []; updateCartUI();
            }
            modalContent.innerHTML = originalHTML;
            bindCartModalEvents();
            hideCartModal();
            showToast("订单已提交，感谢您的支持");
        };
        function bindCartModalEvents() {
            document.getElementById('closeCartBtn').onclick = hideCartModal;
            document.getElementById('confirmOrderBtn').onclick = confirmOrder;
            document.querySelectorAll('.pay-btn').forEach(btn => {
                btn.onclick = () => {
                    selectedPay = btn.dataset.pay;
                    document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    updateQrPreview();
                };
            });
        }
    }

    function setCategory(cat) {
        currentCategory = cat;
        renderProducts();
        document.querySelectorAll('.cat-btn').forEach(btn => {
            if (btn.dataset.cat === cat) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }

    // 绑定事件
    document.getElementById('openCartBtn').addEventListener('click', showCartModal);
    document.getElementById('closeCartBtn').addEventListener('click', hideCartModal);
    document.getElementById('confirmOrderBtn').addEventListener('click', confirmOrder);
    document.querySelectorAll('.pay-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            selectedPay = btn.dataset.pay;
            document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            updateQrPreview();
        });
    });
    document.querySelectorAll('.cat-btn').forEach(btn => {
        btn.addEventListener('click', () => setCategory(btn.dataset.cat));
    });
    window.onclick = (event) => { if (event.target === document.getElementById('cartModal')) hideCartModal(); };

    renderProducts();
    updateCartUI();
</script>
</body>
</html>
